<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Sleek dark slate background */
            color: #f8fafc;
            overflow: hidden;
            text-align: center;
            padding: 0 1rem;
            box-sizing: border-box;
        }
        
        .small-text {
            font-size: clamp(0.875rem, 3vw, 1.125rem);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #94a3b8; /* Muted modern grey */
            white-space: nowrap;
            margin-bottom: 1rem;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            line-height: 1.2;
            margin: 0;
            font-weight: 700;
            /* Beautiful gradient text */
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* Subtle glow effect */
            filter: drop-shadow(0 0 2em rgba(56, 189, 248, 0.2));
            /* Micro-animation */
            animation: float 6s ease-in-out infinite;
            cursor: default;
            transition: filter 0.3s ease;
        }

        h1:hover {
            filter: drop-shadow(0 0 3em rgba(129, 140, 248, 0.4));
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>
    <div class="small-text">Welcome to my online home</div>
    <h1>Best Digital Marketing Expert in Kochi</h1>
</body>
</html>
